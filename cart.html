<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Keranjang Pesanan</title>

<link
rel="stylesheet"
href="css/style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- HEADER -->

<header class="header cart-header">

<div class="header-bg"></div>

<div class="header-content">

<div class="brand">

<img
src="images/logo.png"
class="logo">

<div>

<h1>KERANJANG PESANAN</h1>

<p>
Periksa kembali pesanan Anda
</p>

</div>

</div>

<a
href="index.html"
class="cart-btn">

<i class="fa-solid fa-arrow-left"></i>

<span>
Kembali Menu
</span>

</a>

</div>

</header>

<!-- CONTAINER -->

<div class="cart-page">

<!-- DAFTAR PESANAN -->

<div class="cart-box">

<h2>

<i class="fa-solid fa-cart-shopping"></i>

Daftar Pesanan

</h2>

<div id="cartItems">

</div>

<div
class="cart-total"
id="totalHarga">

Total : Rp 0

</div>

<button
class="clear-btn"
onclick="clearCart()">

Kosongkan Keranjang

</button>

</div>

<!-- FORM PEMESAN -->

<div class="checkout-box">

<h2>

<i class="fa-solid fa-user"></i>

Data Pemesan

</h2>

<div class="form-group">

<label>

Nama Pemesan

</label>

<input
type="text"
id="nama"
placeholder="Masukkan nama">

</div>

</div>

<div class="form-group">

<label>

Catatan

</label>

<textarea
id="catatan"
placeholder="Contoh: Sambal dipisah">
</textarea>

</div>

<button
class="checkout-btn"
onclick="checkoutWA()">

<i class="fa-brands fa-whatsapp"></i>

Pesan Sekarang

</button>

</div>

</div>

<script src="js/script.js"></script>

</body>

</html>
